apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: default
  labels:
    app: mcp-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
    spec:
      serviceAccountName: vault-auth-sa
      containers:
        - name: mcp-gateway
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/agentinfra-mcp-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
              name: http
          env:
            - name: PORT
              value: "8085"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /mcp/v1/health
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /mcp/v1/health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: mcp-gateway
  ports:
    - port: 8085
      targetPort: 8085
      name: http
