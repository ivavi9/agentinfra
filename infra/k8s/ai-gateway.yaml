# Placeholder service required by Kubernetes Ingress schema
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway-placeholder
  namespace: default
spec:
  type: ExternalName
  externalName: "bedrock-runtime.us-east-1.amazonaws.com"

---
# KongPlugin using provider: bedrock to proxy payload keylessly to AWS Bedrock
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: gemini-ai-proxy
  namespace: default
plugin: ai-proxy
configFrom:
  secretKeyRef:
    name: gemini-ai-proxy-config
    key: config

---
# Ingress routing /v1 requests to Bedrock via Kong and the AI Proxy plugin
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-gateway-ingress
  namespace: default
  annotations:
    konghq.com/plugins: gemini-ai-proxy
    konghq.com/strip-path: "true"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: ai-gateway-placeholder
                port:
                  number: 443
