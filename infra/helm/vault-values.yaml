# Production Vault Configuration (HA Raft Storage with AWS KMS Auto-Unseal)
server:
  dev:
    enabled: false # Production Vault cluster — dev mode disabled

  ha:
    enabled: true
    replicas: 3
    config: |
      ui = true
      listener "tcp" {
        tls_disable = 0
        tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
        tls_key_file = "/vault/userconfig/vault-tls/tls.key"
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "raft" {
        path = "/vault/data"
      }
      seal "awskms" {
        region     = "us-east-1"
        kms_key_id = "alias/agentinfra-vault-unseal-key"
      }

  ui:
    enabled: true
    serviceType: "ClusterIP"

injector:
  enabled: true
  authPath: "auth/kubernetes"
