# Kong Gateway Configuration (Production Mode with TLS 1.3 Termination)
env:
  database: "off"
  nginx_proxy_client_body_buffer_size: "10m"
  nginx_proxy_client_max_body_size: "20m"
  ssl_protocols: "TLSv1.2 TLSv1.3"

ingressController:
  enabled: true
  installCRDs: false

# Expose HTTPS LoadBalancer with AWS ACM TLS certificate termination
proxy:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:818593257879:certificate/agentinfra-edge-tls"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
  http:
    enabled: true
  tls:
    enabled: true
    overrideServiceTargetPort: 8000
